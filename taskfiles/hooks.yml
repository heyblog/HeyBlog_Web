# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: '3'

tasks:
  hooks:install:
    desc: Install local git hooks
    cmds:
      - chmod +x .githooks/*
      - git config core.hooksPath .githooks

  hooks:pre-commit:
    desc: Format and lint staged code-style files
    cmds:
      - node ./scripts/pre-commit.mjs

  hooks:commit-msg:
    desc: Lint commit message file
    requires:
      vars:
        - MSG_FILE
    cmds:
      - pnpm exec commitlint --config ./commitlint.config.cjs --edit {{.MSG_FILE}}
