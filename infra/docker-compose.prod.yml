name: zhblogs

services:
  api:
    image: ${DOCKERHUB_NAMESPACE:?DOCKERHUB_NAMESPACE is required}/zhblogs-api:${IMAGE_TAG:-main}
    restart: unless-stopped
    env_file:
      - ../.env.prod
    environment:
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      VALKEY_URL: ${VALKEY_URL:?VALKEY_URL is required}
    extra_hosts:
      - host.docker.internal:host-gateway
    ports:
      - "${API_PORT:-9201}:9201"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:9201/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 12

  web:
    image: ${DOCKERHUB_NAMESPACE:?DOCKERHUB_NAMESPACE is required}/zhblogs-web:${IMAGE_TAG:-main}
    restart: unless-stopped
    env_file:
      - ../.env.prod
    environment:
      PUBLIC_API_BASE_URL: ${PUBLIC_API_BASE_URL:-http://api:9201}
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${WEB_PORT:-9101}:9101"

  worker:
    image: ${DOCKERHUB_NAMESPACE:?DOCKERHUB_NAMESPACE is required}/zhblogs-worker:${IMAGE_TAG:-main}
    restart: unless-stopped
    env_file:
      - ../.env.prod
    environment:
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      WORKER_API_BASE_URL: ${WORKER_API_BASE_URL:-http://api:9201}
    extra_hosts:
      - host.docker.internal:host-gateway
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${WORKER_PORT:-9301}:9301"
